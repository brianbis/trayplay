name: Build Windows Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyatv pyaudiowpatch pycaw pystray Pillow comtypes

      - name: Build TrayPlay
        run: |
          pyinstaller TrayPlay.spec

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist\TrayPlay\* -DestinationPath dist\TrayPlay-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrayPlay-windows
          path: dist/TrayPlay-windows.zip

      - name: Attach archive to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TrayPlay-windows.zip
          generate_release_notes: true
